

- name: Installer et configurer node_exporter
  hosts: monitored_servers
  become: true

  vars:
    node_exporter_version: "1.8.1"
    node_exporter_user: "node_exporter"
    node_exporter_port: 9100

  tasks:

    - name: Créer un utilisateur système dédié (sans shell login)
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Télécharger node_exporter v{{ node_exporter_version }}
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/\
              v{{ node_exporter_version }}/\
              node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        mode: '0644'

    - name: Extraire l'archive
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Installer le binaire dans /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: "/usr/local/bin/node_exporter"
        mode: '0755'
        remote_src: true

    - name: Déployer le service systemd via template
      ansible.builtin.template:
        src: "node_exporter.service.j2"
        dest: "/etc/systemd/system/node_exporter.service"
        mode: '0644'
      notify: Redémarrer node_exporter

    - name: Activer et démarrer node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Ouvrir le port {{ node_exporter_port }} (UFW)
      community.general.ufw:
        rule: allow
        port: "{{ node_exporter_port }}"
        proto: tcp
      ignore_errors: true

    - name: Vérifier que node_exporter répond
      ansible.builtin.uri:
        url: "http://localhost:{{ node_exporter_port }}/metrics"
        status_code: 200
      register: health_check
      retries: 3
      delay: 5

  handlers:
    - name: Redémarrer node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
        daemon_reload: true
