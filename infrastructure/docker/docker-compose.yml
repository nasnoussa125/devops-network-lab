version: '3.8'

networks:
  production_network:
    driver: bridge

services:
  web-server:
    image: nginx:alpine
    container_name: srv-web-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - production_network
    restart: always

  app-database:
    image: postgres:15-alpine
    container_name: srv-db-postgres
    environment:
      POSTGRES_DB: enterprise_db
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    networks:
      - production_network
    restart: always
